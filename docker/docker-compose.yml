version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: flowpilot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: flowpilot
    ports:
      - "5432:5432"
    volumes:
      - flowpilot_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d flowpilot"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    container_name: flowpilot-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 3000
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/flowpilot
      VLLM_URL: ${VLLM_URL:-http://host.docker.internal:8000/v1/chat/completions}
    working_dir: /app/apps/api
    command: sh -c "pnpm prisma:generate && pnpm prisma:push && pnpm prisma:seed && pnpm start"
    ports:
      - "3000:3000"

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    container_name: flowpilot-web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3000
    ports:
      - "3001:3001"

volumes:
  flowpilot_pg_data:
