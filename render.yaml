databases:
  - name: flowpilot-db
    databaseName: flowpilot
    plan: free

services:
  - type: web
    name: flowpilot-api
    runtime: docker
    repo: https://github.com/YeshanGarg/flowpilot
    branch: main
    dockerfilePath: apps/api/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: flowpilot-db
          property: connectionString
      - key: PORT
        value: "3000"
      # Set the AMD Developer Cloud vLLM endpoint (with ?token=...) in the Render dashboard
      - key: VLLM_URL
        sync: false
      - key: VLLM_MODEL
        value: Qwen/Qwen3-0.6B
      # Admin login credentials — set ADMIN_PASSWORD in the Render dashboard (secret)
      - key: ADMIN_EMAIL
        value: admin@flowpilot.dev
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_TOKEN_SECRET
        generateValue: true
