databases:
  - name: flowpilot-db
    databaseName: flowpilot
    plan: free

services:
  - type: web
    name: flowpilot-api
    runtime: docker
    repo: https://github.com/YeshanGarg/flowpilot
    branch: main
    dockerfilePath: apps/api/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    # Create/update the DB schema and seed demo data before each deploy goes live
    preDeployCommand: "cd apps/api && pnpm prisma:push && pnpm prisma:seed"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: flowpilot-db
          property: connectionString
      - key: PORT
        value: "3000"
      # Set the AMD Developer Cloud vLLM endpoint (with ?token=...) in the Render dashboard
      - key: VLLM_URL
        sync: false
      - key: VLLM_MODEL
        value: Qwen/Qwen3-0.6B
